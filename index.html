<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FE Portal - Customer Lookup</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            max-width: 700px;
            margin: 40px auto;
            padding: 20px;
            background-color: #0f172a; /* Deep dark navy background */
            color: #f3f4f6; /* Off-white text */
        }
        
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
        }

        .brand-badge {
            background-color: #f59e0b; /* Amber yellow */
            color: #0f172a;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
        }

        h2 {
            color: #ffffff;
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .card {
            background-color: #1e293b; /* Slate dark card body */
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #334155;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #f59e0b; /* Accent highlight yellow */
            margin-bottom: 15px;
            font-weight: 600;
        }

        .search-box {
            display: flex;
            gap: 12px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            font-size: 15px;
            background-color: #0f172a;
            border: 1px solid #475569;
            border-radius: 6px;
            color: #ffffff;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #f59e0b; /* Yellow focus ring */
        }

        button {
            padding: 12px 28px;
            font-size: 15px;
            background-color: #f59e0b; /* Theme amber yellow button */
            color: #0f172a;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #d97706;
        }

        button:disabled, input:disabled {
            background-color: #1e293b;
            border-color: #334155;
            color: #64748b;
            cursor: not-allowed;
        }

        .result-card {
            display: none;
            border-left: 4px solid #f59e0b; /* Left accent line matching script tool */
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2px;
            background-color: #334155; /* Grid border line effect */
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .result-item {
            padding: 14px 18px;
            background-color: #1e293b;
            font-size: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-item:nth-child(even) {
            background-color: #161e2e; /* Alternate subtle dark rows */
        }

        .result-item strong {
            color: #94a3b8; /* Muted gray labels */
            font-weight: 500;
        }

        .result-item span {
            font-weight: 600;
            color: #ffffff;
        }

        /* Status Banner notifications */
        .status {
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            padding: 12px;
            border-radius: 6px;
        }
        .loading { 
            background-color: rgba(245, 158, 11, 0.1); 
            color: #f59e0b; 
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        .error { 
            background-color: rgba(239, 68, 68, 0.1); 
            color: #ef4444; 
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .success { 
            background-color: rgba(16, 185, 129, 0.1); 
            color: #10b981; 
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>Customer Lookup System</h2>
        <div class="brand-badge">FE Portal</div>
    </div>

    <div id="statusMessage" class="status loading">🔄 Syncing with customer core database...</div>

    <div class="card">
        <div class="card-title">Live Agent Verification Panel</div>
        <form onsubmit="event.preventDefault(); searchCustomer();" class="search-box">
            <input type="text" id="phoneInput" placeholder="Enter customer phone number..." disabled>
            <button id="searchBtn" type="submit" disabled>Search</button>
        </form>
    </div>

    <div id="resultCard" class="card result-card">
        <div class="card-title" style="margin-bottom: 18px;">Verified Account Profile</div>
        <div class="result-grid">
            <div class="result-item"><strong>First Name:</strong> <span id="resFirstName"></span></div>
            <div class="result-item"><strong>Last Name:</strong> <span id="resLastName"></span></div>
            <div class="result-item"><strong>Zip Code:</strong> <span id="resZip"></span></div>
            <div class="result-item"><strong>State:</strong> <span id="resState"></span></div>
            <div class="result-item"><strong>Date of Birth:</strong> <span id="resDob"></span></div>
            <div class="result-item"><strong>Email Address:</strong> <span id="resEmail"></span></div>
        </div>
    </div>

    <script>
        let customerData = [];
        const csvFileName = 'customers.csv'; 

        // Live automatic sync engine
        window.addEventListener('DOMContentLoaded', () => {
            fetch(csvFileName)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Could not seamlessly pull ${csvFileName} database layout.`);
                    }
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                })
                .catch(err => {
                    const statusDiv = document.getElementById('statusMessage');
                    statusDiv.className = "status error";
                    statusDiv.textContent = "⚠️ Core Connection Error: " + err.message;
                });
        });

        function parseCSV(text) {
            const statusDiv = document.getElementById('statusMessage');
            const phoneInput = document.getElementById('phoneInput');
            const searchBtn = document.getElementById('searchBtn');

            try {
                const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
                if (rows.length < 2) {
                    throw new Error("Active database registry contains no rows.");
                }

                const headers = rows[0].split(',').map(h => h.trim());
                customerData = [];

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',').map(c => c.trim());
                    let rowObject = {};
                    
                    headers.forEach((header, index) => {
                        rowObject[header] = columns[index] || '';
                    });

                    if (rowObject['phone']) {
                        rowObject.cleanPhone = rowObject['phone'].replace(/\D/g, '');
                    }

                    customerData.push(rowObject);
                }

                statusDiv.className = "status success";
                statusDiv.textContent = `🟢 Database synced. ${customerData.length} active client profiles verified.`;
                
                phoneInput.disabled = false;
                phoneInput.focus();
                searchBtn.disabled = false;

            } catch (err) {
                statusDiv.className = "status error";
                statusDiv.textContent = "⚠️ Runtime Parse Error: " + err.message;
            }
        }

        function searchCustomer() {
            const rawInput = document.getElementById('phoneInput').value;
            const phoneQuery = rawInput.replace(/\D/g, ''); 
            const card = document.getElementById('resultCard');

            if (!phoneQuery) return;

            const customer = customerData.find(c => c.cleanPhone === phoneQuery);

            if (customer) {
                document.getElementById('resFirstName').textContent = customer['firstName'] || 'N/A';
                document.getElementById('resLastName').textContent = customer['lastName'] || 'N/A';
                document.getElementById('resZip').textContent = customer['zipcode'] || 'N/A';
                document.getElementById('resState').textContent = customer['state'] || 'N/A';
                document.getElementById('resDob').textContent = customer['Date of Birth'] || 'N/A';
                document.getElementById('resEmail').textContent = customer['email'] || 'N/A';

                card.style.display = 'block';
            } else {
                card.style.display = 'none';
                alert("No active client profile matching this entry was recovered.");
            }
        }
    </script>
</body>
</html>
