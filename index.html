<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Customer Lookup</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 650px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            padding: 12px 24px;
            font-size: 16px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #27ae60;
        }
        button:disabled, input:disabled {
            background-color: #f2f2f2;
            color: #aaa;
            cursor: not-allowed;
        }
        .result-card {
            display: none;
            border-left: 5px solid #3498db;
        }
        .result-item {
            padding: 12px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        .result-item strong {
            color: #7f8c8d;
        }
        .result-item span {
            font-weight: 500;
            color: #2c3e50;
        }
        .status {
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }
        .error { color: #e74c3c; }
        .success { color: #27ae60; }
        .loading { color: #3498db; }
    </style>
</head>
<body>

    <h2>Customer Lookup System</h2>
    <div class="subtitle">Internal Agent Tool</div>

    <div id="statusMessage" class="status loading">🔄 Connecting to database, please wait...</div>

    <div class="card">
        <label for="phoneInput"><strong>Enter Customer Phone Number</strong></label>
        <form onsubmit="event.preventDefault(); searchCustomer();" class="search-box">
            <input type="text" id="phoneInput" placeholder="e.g. 8506586139 or 850-658-6139" disabled>
            <button id="searchBtn" type="submit" disabled>Search</button>
        </form>
    </div>

    <div id="resultCard" class="card result-card">
        <h3 style="margin-top:0; color: #2c3e50; padding-bottom: 8px; border-bottom: 2px solid #3498db;">Customer Details</h3>
        <div class="result-item"><strong>First Name:</strong> <span id="resFirstName"></span></div>
        <div class="result-item"><strong>Last Name:</strong> <span id="resLastName"></span></div>
        <div class="result-item"><strong>Address:</strong> <span id="resAddress"></span></div>
        <div class="result-item"><strong>City:</strong> <span id="resCity"></span></div>
        <div class="result-item"><strong>State:</strong> <span id="resState"></span></div>
        <div class="result-item"><strong>Zip:</strong> <span id="resZip"></span></div>
        <div class="result-item"><strong>Email:</strong> <span id="resEmail"></span></div>
        <div class="result-item"><strong>DOB:</strong> <span id="resDob"></span></div>
    </div>

    <script>
        let customerData = [];
        
        // This targets the CSV file sitting in your GitHub repo right next to this HTML file
        const csvFileName = 'customers.csv'; 

        // Automatically load the CSV as soon as the page opens
        window.addEventListener('DOMContentLoaded', () => {
            fetch(csvFileName)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Could not find ${csvFileName} in your repository.`);
                    }
                    return response.text();
                })
                .then(text => {
                    parseCSV(text);
                })
                .catch(err => {
                    const statusDiv = document.getElementById('statusMessage');
                    statusDiv.className = "status error";
                    statusDiv.textContent = "⚠️ Database Error: " + err.message;
                });
        });

        // Parse CSV text matching your Excel spreadsheet columns
        function parseCSV(text) {
            const statusDiv = document.getElementById('statusMessage');
            const phoneInput = document.getElementById('phoneInput');
            const searchBtn = document.getElementById('searchBtn');

            try {
                const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
                if (rows.length < 2) {
                    throw new Error("The database file seems empty.");
                }

                // Grab headers exactly as they appear in your sheet (Fname, Lname, Phone, etc.)
                const headers = rows[0].split(',').map(h => h.trim());

                customerData = [];

                for (let i = 1; i < rows.length; i++) {
                    const columns = rows[i].split(',').map(c => c.trim());
                    let rowObject = {};
                    
                    headers.forEach((header, index) => {
                        rowObject[header] = columns[index] || '';
                    });

                    if (rowObject['Phone']) {
                        rowObject.cleanPhone = rowObject['Phone'].replace(/\D/g, '');
                    }

                    customerData.push(rowObject);
                }

                statusDiv.className = "status success";
                statusDiv.textContent = `🟢 Database connected. ${customerData.length} records active.`;
                
                // Unlock input so agents can begin searching
                phoneInput.disabled = false;
                phoneInput.focus();
                searchBtn.disabled = false;

            } catch (err) {
                statusDiv.className = "status error";
                statusDiv.textContent = "⚠️ Parsing Error: " + err.message;
            }
        }

        // Search engine logic
        function searchCustomer() {
            const rawInput = document.getElementById('phoneInput').value;
            const phoneQuery = rawInput.replace(/\D/g, ''); 
            const card = document.getElementById('resultCard');

            if (!phoneQuery) return;

            const customer = customerData.find(c => c.cleanPhone === phoneQuery);

            if (customer) {
                document.getElementById('resFirstName').textContent = customer['Fname'] || 'N/A';
                document.getElementById('resLastName').textContent = customer['Lname'] || 'N/A';
                document.getElementById('resAddress').textContent = customer['Address'] || 'N/A';
                document.getElementById('resCity').textContent = customer['City'] || 'N/A';
                document.getElementById('resState').textContent = customer['State'] || 'N/A';
                document.getElementById('resZip').textContent = customer['Zip'] || 'N/A';
                document.getElementById('resEmail').textContent = customer['Email'] || 'N/A';
                document.getElementById('resDob').textContent = customer['DOB'] || 'N/A';

                card.style.display = 'block';
            } else {
                card.style.display = 'none';
                alert("No customer record found for that number.");
            }
        }
    </script>
</body>
</html>
